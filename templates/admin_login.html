<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход в админку</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1e2a1a; }
        .login-box { background: #fffaf2; padding: 40px; border-radius: 30px; text-align: center; }
        input { padding: 10px 20px; margin: 10px; border-radius: 30px; border: 1px solid #c6a27a; }
        button { background: #9f6a3a; color: white; padding: 10px 30px; border: none; border-radius: 30px; cursor: pointer; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Вход в админ-панель</h2>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Пароль" autofocus>
            <br>
            <button type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
